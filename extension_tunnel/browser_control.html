<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Control Panel - Network Logs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-bottom: 2px solid #667eea;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f8f9fa;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
        }

        .status-indicator.connected {
            background: #28a745;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .container {
            display: flex;
            height: calc(100vh - 120px);
        }

        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-right: 1px solid #dee2e6;
            overflow-y: auto;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .control-section {
            background: rgba(255, 255, 255, 0.95);
            margin: 20px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .control-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        .control-group input, .control-group select, .control-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 14px;
        }

        .control-group input:focus, .control-group select:focus, .control-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .button:hover {
            background: #5a6fd8;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.danger {
            background: #dc3545;
        }

        .button.danger:hover {
            background: #c82333;
        }

        .logs-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            margin: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .logs-header {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logs-header h3 {
            color: #667eea;
            font-size: 18px;
        }

        .filter-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-controls select {
            padding: 5px 10px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 12px;
        }

        .logs-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .log-entry {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 12px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
            transition: all 0.2s;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .log-entry:hover {
            background: #e9ecef;
        }

        .log-entry.network {
            border-left-color: #28a745;
        }

        .log-entry.navigation {
            border-left-color: #007bff;
        }

        .log-entry.blocked {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        .log-entry.download {
            border-left-color: #ffc107;
        }

        .log-entry.security {
            border-left-color: #6f42c1;
        }

        .log-time {
            font-size: 10px;
            color: #6c757d;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .log-type {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .log-type.info {
            background: #e3f2fd;
            color: #004085;
        }

        .log-type.security {
            background: #f8d7da;
            color: #721c24;
        }

        .log-url {
            font-size: 13px;
            color: #495057;
            margin-bottom: 6px;
            line-height: 1.4;
            word-break: break-all;
            overflow-wrap: break-word;
        }

        .log-details {
            font-size: 11px;
            color: #6c757d;
            margin-top: 4px;
            padding: 4px 8px;
            background: #e9ecef;
            border-radius: 4px;
            word-break: break-all;
            overflow-wrap: break-word;
        }

        .log-entry.security {
            border-left-color: #6f42c1;
        }

        .log-time {
            color: #6c757d;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .log-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .log-type.network {
            background: #d4edda;
            color: #155724;
        }

        .log-type.navigation {
            background: #d1ecf1;
            color: #0c5460;
        }

        .log-type.blocked {
            background: #f8d7da;
            color: #721c24;
        }

        .log-type.download {
            background: #fff3cd;
            color: #856404;
        }

        .log-type.security {
            background: #e2d9f3;
            color: #383d41;
        }

        .log-url {
            color: #495057;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .log-details {
            color: #6c757d;
            font-size: 11px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }

        .clear-logs {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .clear-logs:hover {
            background: #c82333;
        }

        .refresh-btn {
            margin-left: 10px;
            padding: 2px 8px;
            font-size: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .status-display {
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ Browser Control Panel</h1>
        <div class="status-bar">
            <div class="status-item">
                <div class="status-indicator" id="connectionStatus"></div>
                <span id="connectionText">Disconnected</span>
            </div>
            <div class="status-item">
                <span>Session: </span>
                <span id="sessionId">None</span>
                <button id="refreshSessionBtn" class="refresh-btn">🔄 Refresh</button>
            </div>
            <div class="status-item">
                <span>Window ID: </span>
                <span id="windowId">None</span>
            </div>
            <div class="status-item">
                <span>Tab ID: </span>
                <span id="tabId">None</span>
            </div>
            <div class="status-item">
                <span>Browser: </span>
                <span id="browserStatus">Not Controlled</span>
            </div>
            <div class="status-item">
                <span>Logs: </span>
                <span id="logCount">0</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="control-section">
                <h3> Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalRequests">0</div>
                        <div class="stat-label">Total Requests</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="blockedRequests">0</div>
                        <div class="stat-label">Blocked</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="navigationCount">0</div>
                        <div class="stat-label">Navigation</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="downloadCount">0</div>
                        <div class="stat-label">Downloads</div>
                    </div>
                </div>
            </div>
            
            <div class="control-section">
                <h3>📊 Dashboard</h3>
                
                <div class="control-group">
                    <label for="rulesUpdate">Firewall Rules Update:</label>
                    <button class="button" id="updateRulesBtn">🔄 Update Rules</button>
                    <button class="button" id="checkUpdatesBtn">🔍 Check for Updates</button>
                </div>
                
                <div class="control-group">
                    <label for="engineStatus">Local Engine Status:</label>
                    <div id="engineStatus" class="status-display">
                        <span id="engineStatusText">Checking...</span>
                    </div>
                </div>
                
                <div class="control-group">
                    <label for="lastUpdate">Last Rules Update:</label>
                    <div id="lastUpdate" class="status-display">
                        <span id="lastUpdateText">Never</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="logs-container">
                <div class="logs-header">
                    <h3>📋 Network & Activity Logs</h3>
                    <div class="filter-controls">
                        <select id="logFilter" title="Filter logs by type" aria-label="Filter logs by type">
                            <option value="all">All Logs</option>
                            <option value="network">Network</option>
                            <option value="navigation">Navigation</option>
                            <option value="blocked">Blocked</option>
                            <option value="download">Downloads</option>
                            <option value="security">Security</option>
                        </select>
                        <button class="clear-logs" id="clearLogsBtn">Clear Logs</button>
                    </div>
                </div>
                <div class="logs-content" id="logsContent">
                </div>
            </div>
        </div>
    </div>

    <script src="browser_control.js"></script>
</body>
</html>
